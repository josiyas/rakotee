<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | RAKOTEE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #181d2a;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .checkout-container {
      background: #23283b;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      padding: 2rem 2.5rem;
      margin-top: 2rem;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .rakotee-logo {
      width: 120px;
      margin: 2rem auto 1rem auto;
      display: block;
    }
    h1, h2, h3 {
      color: #fff;
      margin-bottom: 1rem;
    }
    input, button {
      font-size: 1rem;
      border-radius: 0.5rem;
      border: none;
      margin-bottom: 1rem;
      padding: 0.7rem 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    input {
      background: #181d2a;
      color: #fff;
      border: 1px solid #23283b;
    }
    input:focus {
      outline: 2px solid #1e90ff;
    }
    .payment-btn {
      width: 100%;
      margin-bottom: 1rem;
      font-weight: bold;
      transition: background 0.2s;
      cursor: pointer;
    }
    .payment-btn.payfast { background: #ff9900; color: #fff; }
    .payment-btn.payfast:hover { background: #e68a00; }
    .payment-btn.yoco { background: #1a7f37; color: #fff; }
    .payment-btn.yoco:hover { background: #145c27; }
    .payment-btn.peach { background: #23283b; color: #fff; border: 1px solid #fff; }
    .payment-btn.peach:hover { background: #181d2a; }
    .payment-btn.paypal { background: #0070ba; color: #fff; }
    .payment-btn.paypal:hover { background: #005c99; }
    #checkout-summary {
      background: #181d2a;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      width: 100%;
      box-sizing: border-box;
      color: #fff;
      font-size: 1rem;
    }
    #order-success {
      color: #1a7f37;
      font-weight: bold;
      margin-top: 1rem;
      text-align: center;
    }
    #form-error {
      color: #e74c3c;
      margin-bottom: 1rem;
      text-align: center;
    }
    @media (max-width: 600px) {
      .checkout-container {
        padding: 1rem;
        max-width: 98vw;
      }
      .rakotee-logo {
        width: 80px;
      }
    }
  </style>
</head>
<body>
  <img src="rakotee.png.png" alt="Rakotee Logo" class="rakotee-logo" />
  <div class="checkout-container">
    <h1>Checkout</h1>
    <div id="checkout-summary"></div>
    <form id="checkout-form">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="address" placeholder="Shipping Address" required>
      <div id="form-error" style="color:red;margin-top:10px;"></div>
    </form>
    <div id="order-success" style="display:none;color:green;margin-top:20px;font-weight:bold;"></div>
    <h2>Choose Payment Method</h2>
    <div id="payment-options" style="margin-bottom:2rem;width:100%;">
      <button id="payfastBtn" class="payment-btn payfast">PayFast</button>
    </div>
  </div>
  <script>
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  let total = cart.reduce((sum, item) => sum + (item.price || 0) * (item.quantity || 1), 0);
  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:5000'
    : 'https://rakotee-back.onrender.com';
  // parse query params early so capture logic below can use it
  const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('checkout-summary').innerHTML =
      cart.length
        ? `<h2>Order Summary</h2>${cart.map(item => `<div>${item.name} x${item.quantity} - R${(item.price * item.quantity).toFixed(2)}</div>`).join('')}<hr><div><strong>Total: R${total.toFixed(2)}</strong></div>`
        : '<p>Your cart is empty.</p>';

    document.getElementById('checkout-form').onsubmit = async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const errorDiv = document.getElementById('form-error');
      errorDiv.textContent = '';
      // Simple validation
      if (!name || !email || !address) {
        errorDiv.textContent = 'Please fill in all fields.';
        return;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        errorDiv.textContent = 'Please enter a valid email address.';
        return;
      }
      if (address.length < 5) {
        errorDiv.textContent = 'Please enter a valid shipping address.';
        return;
      }
      if (!cart.length) {
        errorDiv.textContent = 'Your cart is empty.';
        return;
      }
      // Send order to backend
      try {
        const response = await fetch(`${API_BASE}/api/order`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, address, cart })
        });
        if (!response.ok) throw new Error('Order failed.');
        document.getElementById('order-success').textContent = 'Order placed! Thank you for shopping with us.';
        document.getElementById('order-success').style.display = 'block';
        localStorage.removeItem('cart');
        setTimeout(() => { window.location.href = 'index.html'; }, 2500);
      } catch (err) {
        errorDiv.textContent = 'Could not place order. Please try again.';
      }
    };
  // Set payment amounts dynamically (used when posting to server)
    // Note: paypal-amount input was removed from the markup; keep total in JS only
    // Set return URL for PayFast
    const payfastReturn = window.location.origin + '/checkout.html?payfast=success';
    document.getElementById('payfastBtn').addEventListener('click', async function (e) {
      e.preventDefault();
      if (!cart.length) {
        document.getElementById('form-error').textContent = 'Your cart is empty.';
        return;
      }
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const errorDiv = document.getElementById('form-error');
      errorDiv.textContent = '';
      if (!name || !email || !address) {
        errorDiv.textContent = 'Please fill in your name, email and address before paying.';
        return;
      }
      // POST order to backend which will emit an HTML form to PayFast
      try {
        const resp = await fetch(`${API_BASE}/api/order/payfast`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, address, cart, return_url: payfastReturn })
        });
        if (!resp.ok) throw new Error('Failed to initiate payment');
        const html = await resp.text();
        const win = window.open('', '_blank');
        if (!win) {
          errorDiv.textContent = 'Popup blocked. Please allow popups for this site.';
          return;
        }
        win.document.open();
        win.document.write(html);
        win.document.close();
      } catch (err) {
        errorDiv.textContent = 'Could not initiate PayFast payment. Please try again.';
      }
    });
    // Yoco and Peach Payments demo (guard for optional buttons)
    const yocoBtn = document.getElementById('yocoPayBtn');
    if (yocoBtn) yocoBtn.onclick = function() { placeOrderAfterPayment('Yoco'); };
    const peachBtn = document.getElementById('peachPayBtn');
    if (peachBtn) peachBtn.onclick = function() { placeOrderAfterPayment('Peach Payments'); };
    // Place order only after payment
    function placeOrderAfterPayment(method) {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const errorDiv = document.getElementById('form-error');
      errorDiv.textContent = '';
      if (!name || !email || !address) {
        errorDiv.textContent = 'Please fill in all fields.';
        return;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        errorDiv.textContent = 'Please enter a valid email address.';
        return;
      }
      if (address.length < 5) {
        errorDiv.textContent = 'Please enter a valid shipping address.';
        return;
      }
      if (!cart.length) {
        errorDiv.textContent = 'Your cart is empty.';
        return;
      }
      fetch('http://localhost:5000/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, address, cart, paymentMethod: method })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('order-success').textContent = 'Order placed after payment! Thank you.';
        document.getElementById('order-success').style.display = 'block';
        localStorage.removeItem('cart');
        setTimeout(() => { window.location.href = 'index.html'; }, 2500);
      })
      .catch(() => {
        errorDiv.textContent = 'Could not place order. Please try again.';
      });
    }
  // Check for payment provider return (PayFast/PayPal)
  if (urlParams.get('payfast') === 'success') {
      const id = urlParams.get('orderId');
      document.getElementById('order-success').textContent = id ? `Payment initiated. Order ID: ${id}. We'll update status once payment is confirmed.` : 'Payment initiated. We will confirm once payment is received.';
      document.getElementById('order-success').style.display = 'block';
      // clear local cart (user already paid on PayFast side)
      localStorage.removeItem('cart');
    }
    if (urlParams.get('paypal') === 'success') {
      document.getElementById('order-success').textContent = 'Payment initiated via PayPal. We will confirm once payment is received.';
      document.getElementById('order-success').style.display = 'block';
      localStorage.removeItem('cart');
    }
  </script>
</body>
</html>
