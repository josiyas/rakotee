<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | RAKOTEE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #181d2a;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .checkout-container {
      background: #23283b;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      padding: 2rem 2.5rem;
      margin-top: 2rem;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .rakotee-logo {
      width: 120px;
      margin: 2rem auto 1rem auto;
      display: block;
    }
    h1, h2, h3 {
      color: #fff;
      margin-bottom: 1rem;
    }
    input, button {
      font-size: 1rem;
      border-radius: 0.5rem;
      border: none;
      margin-bottom: 1rem;
      padding: 0.7rem 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    input {
      background: #181d2a;
      color: #fff;
      border: 1px solid #23283b;
    }
    input:focus {
      outline: 2px solid #1e90ff;
    }
    .payment-btn {
      width: 100%;
      margin-bottom: 1rem;
      font-weight: bold;
      transition: background 0.2s;
      cursor: pointer;
    }
    .payment-btn.payfast { background: #ff9900; color: #fff; }
    .payment-btn.payfast:hover { background: #e68a00; }
    .payment-btn.yoco { background: #1a7f37; color: #fff; }
    .payment-btn.yoco:hover { background: #145c27; }
    .payment-btn.peach { background: #23283b; color: #fff; border: 1px solid #fff; }
    .payment-btn.peach:hover { background: #181d2a; }
    .payment-btn.paypal { background: #0070ba; color: #fff; }
    .payment-btn.paypal:hover { background: #005c99; }
    #checkout-summary {
      background: #181d2a;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      width: 100%;
      box-sizing: border-box;
      color: #fff;
      font-size: 1rem;
    }
    #order-success {
      color: #1a7f37;
      font-weight: bold;
      margin-top: 1rem;
      text-align: center;
    }
    #form-error {
      color: #e74c3c;
      margin-bottom: 1rem;
      text-align: center;
    }
    @media (max-width: 600px) {
      .checkout-container {
        padding: 1rem;
        max-width: 98vw;
      }
      .rakotee-logo {
        width: 80px;
      }
    }
  </style>
</head>
<body>
  <img src="rakotee.png.png" alt="Rakotee Logo" class="rakotee-logo" />
  <div class="checkout-container">
    <h1>Checkout</h1>
    <div id="checkout-summary"></div>
    <form id="checkout-form">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="address" placeholder="Shipping Address" required>
      <button id="placeOrderBtn" type="submit" class="payment-btn peach">Place Order (Manual)</button>
      <div id="form-error" style="color:red;margin-top:10px;"></div>
    </form>
    <div id="order-success" style="display:none;color:green;margin-top:20px;font-weight:bold;"></div>
    <h2>Choose Payment Method</h2>
    <div id="payment-options" style="margin-bottom:2rem;width:100%;">
      <button id="payfastBtn" type="button" class="payment-btn payfast">PayFast</button>
    </div>
  </div>
  <script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000'
      : 'https://rakotee-back.onrender.com';
    const urlParams = new URLSearchParams(window.location.search);

    const formEl = document.getElementById('checkout-form');
    const summaryEl = document.getElementById('checkout-summary');
    const errorEl = document.getElementById('form-error');
    const successEl = document.getElementById('order-success');
    const payfastBtn = document.getElementById('payfastBtn');
    const placeOrderBtn = document.getElementById('placeOrderBtn');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const addressInput = document.getElementById('address');

    function getCart() {
      const raw = localStorage.getItem('cart');
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    }

    function getTotal(cart) {
      return cart.reduce((sum, item) => sum + (Number(item.price) || 0) * (Number(item.quantity) || 1), 0);
    }

    function showError(message) {
      errorEl.textContent = message || '';
    }

    function showSuccess(message) {
      successEl.textContent = message;
      successEl.style.display = 'block';
      showError('');
    }

    function setButtonsDisabled(disabled) {
      payfastBtn.disabled = disabled;
      placeOrderBtn.disabled = disabled;
    }

    function validateCustomer() {
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const address = addressInput.value.trim();

      if (!name || !email || !address) {
        showError('Please fill in all fields.');
        return null;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        showError('Please enter a valid email address.');
        return null;
      }
      if (address.length < 5) {
        showError('Please enter a valid shipping address.');
        return null;
      }

      return { name, email, address };
    }

    function renderSummary() {
      const cart = getCart();
      const total = getTotal(cart);

      summaryEl.innerHTML = cart.length
        ? `<h2>Order Summary</h2>${cart.map((item) => `<div>${item.name} x${item.quantity} - R${((Number(item.price) || 0) * (Number(item.quantity) || 1)).toFixed(2)}</div>`).join('')}<hr><div><strong>Total: R${total.toFixed(2)}</strong></div>`
        : '<p>Your cart is empty.</p>';

      const empty = cart.length === 0;
      setButtonsDisabled(empty);
      if (empty) {
        showError('Your cart is empty. Add items before checking out.');
      }
      return { cart, total };
    }

    function persistCheckoutDetails() {
      const details = {
        name: nameInput.value.trim(),
        email: emailInput.value.trim(),
        address: addressInput.value.trim()
      };
      localStorage.setItem('rakotee_checkout_details', JSON.stringify(details));
    }

    function loadCheckoutDetails() {
      try {
        const raw = localStorage.getItem('rakotee_checkout_details');
        if (!raw) return;
        const details = JSON.parse(raw);
        if (!details || typeof details !== 'object') return;
        if (details.name) nameInput.value = details.name;
        if (details.email) emailInput.value = details.email;
        if (details.address) addressInput.value = details.address;
      } catch {
        // ignore bad stored checkout details
      }
    }

    loadCheckoutDetails();
    const initial = renderSummary();

    [nameInput, emailInput, addressInput].forEach((input) => {
      input.addEventListener('input', persistCheckoutDetails);
    });

    formEl.addEventListener('submit', async function (e) {
      e.preventDefault();
      showError('');

      const { cart } = renderSummary();
      const customer = validateCustomer();
      if (!customer) return;
      if (!cart.length) return;

      setButtonsDisabled(true);
      placeOrderBtn.textContent = 'Placing Order...';

      try {
        const response = await fetch(`${API_BASE}/api/order`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...customer, cart })
        });
        if (!response.ok) throw new Error('Order failed.');

        showSuccess('Order placed! Thank you for shopping with us.');
        localStorage.removeItem('cart');
        setTimeout(() => { window.location.href = 'order-success.html'; }, 2000);
      } catch {
        showError('Could not place order. Please try again.');
        setButtonsDisabled(false);
      } finally {
        placeOrderBtn.textContent = 'Place Order (Manual)';
      }
    });

    payfastBtn.addEventListener('click', async function () {
      showError('');

      const { cart } = renderSummary();
      const customer = validateCustomer();
      if (!customer) return;
      if (!cart.length) return;

      const payfastReturn = `${window.location.origin}/checkout.html?payfast=success`;
      setButtonsDisabled(true);
      payfastBtn.textContent = 'Opening PayFast...';

      try {
        const resp = await fetch(`${API_BASE}/api/order/payfast`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...customer, cart, return_url: payfastReturn })
        });
        if (!resp.ok) throw new Error('Failed to initiate payment');

        const html = await resp.text();
        const win = window.open('', '_blank');
        if (!win) {
          showError('Popup blocked. Please allow popups for this site.');
          setButtonsDisabled(false);
          return;
        }
        win.document.open();
        win.document.write(html);
        win.document.close();
      } catch {
        showError('Could not initiate PayFast payment. Please try again.');
        setButtonsDisabled(false);
      } finally {
        payfastBtn.textContent = 'PayFast';
      }
    });

    if (urlParams.get('payfast') === 'success') {
      const id = urlParams.get('orderId');
      showSuccess(id
        ? `Payment initiated. Order ID: ${id}. We'll confirm status shortly.`
        : 'Payment initiated. We will confirm once payment is received.');
      localStorage.removeItem('cart');
      renderSummary();
    }

    if (urlParams.get('paypal') === 'success') {
      showSuccess('Payment initiated via PayPal. We will confirm once payment is received.');
      localStorage.removeItem('cart');
      renderSummary();
    }
  </script>
</body>
</html>
