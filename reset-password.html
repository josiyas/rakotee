<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAKOTEE | Reset Password</title>
  <link rel="stylesheet" href="style.min.css" />
  <link rel="stylesheet" href="theme.min.css" />
</head>
<body>
  <header class="main-header">
    <nav class="nav-container">
      <div class="logo"><a href="index.html">RAKOTEE</a></div>
      <div style="display:flex;gap:1.5rem;align-items:center;">
        <a href="products.html" style="color:#fff;text-decoration:none;font-weight:600;">Products</a>
        <a href="login.html" style="color:#fff;text-decoration:none;font-weight:600;">Login</a>
      </div>
    </nav>
  </header>

  <main class="container auth-container">
    <h2>Reset Your Password</h2>
    <p id="rpMsg" style="display:none;"></p>
    <form id="rpForm">
      <label for="password">New Password</label><br/>
      <input type="password" id="password" name="password" required minlength="8" /><br/>
      <label for="confirm">Confirm Password</label><br/>
      <input type="password" id="confirm" name="confirm" required minlength="8" /><br/>
      <button type="submit">Reset Password</button>
    </form>
    <p><a href="login.html">Back to Login</a></p>
  </main>

  <script>
    const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : 'https://rakotee-back.onrender.com';

    const form = document.getElementById('rpForm');
    const msgEl = document.getElementById('rpMsg');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const email = params.get('email');

    if (!token || !email) {
      msgEl.style.color = 'red';
      msgEl.textContent = 'Invalid reset link. Please request a new one.';
      msgEl.style.display = 'block';
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = form.password.value;
      const confirm = form.confirm.value;

      msgEl.style.display = 'none';

      if (password !== confirm) {
        msgEl.style.color = 'red';
        msgEl.textContent = 'Passwords do not match.';
        msgEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(apiBase + '/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, password }),
        });
        const data = await res.json();

        if (res.ok) {
          msgEl.style.color = 'green';
          msgEl.textContent = data.message || 'Password reset successful! Redirecting to login...';
          msgEl.style.display = 'block';
          form.style.display = 'none';
          setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        } else {
          msgEl.style.color = 'red';
          msgEl.textContent = data.message || 'Reset failed. The link may have expired.';
          msgEl.style.display = 'block';
        }
      } catch {
        msgEl.style.color = 'red';
        msgEl.textContent = 'Network error. Please try again.';
        msgEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
