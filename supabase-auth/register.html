<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rakotee - Register</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f7fb}
    .card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(12,24,48,.08);width:360px}
    label{display:block;margin:8px 0 4px;font-size:14px}
    input{width:100%;padding:10px;border:1px solid #e1e6ef;border-radius:6px}
    button{margin-top:12px;width:100%;padding:10px;border:0;border-radius:6px;background:#0b5cff;color:#fff;font-weight:600}
    .muted{font-size:13px;color:#6b7280;margin-top:8px;text-align:center}
    .error{color:#b91c1c;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin:0 0 12px 0">Create account</h3>
    <div>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" required />
      <button id="submit">Create account</button>
      <div class="muted">Already have an account? <a href="/supabase-auth/login.html">Sign in</a></div>
      <div id="msg" class="error" aria-live="polite"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="/supabase-auth/auth.js"></script>
  <script>
    const submit = document.getElementById('submit');
    const msg = document.getElementById('msg');
    submit.addEventListener('click', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return msg.textContent = 'Email and password are required.';
      submit.disabled = true;
      const { data, error } = await RakoteeAuth.signUp(email, password);
      submit.disabled = false;
      if (error) {
        msg.textContent = error.message || JSON.stringify(error);
        return;
      }
      msg.style.color = 'green';
      msg.textContent = 'Check your email to verify your account.';
    });
  </script>
</body>
</html>
