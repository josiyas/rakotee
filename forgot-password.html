<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAKOTEE | Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="main-header">
    <nav class="nav-container">
      <div class="logo"><a href="index.html">RAKOTEE</a></div>
      <div style="display:flex;gap:1.5rem;align-items:center;">
        <a href="products.html" style="color:#fff;text-decoration:none;font-weight:600;">Products</a>
        <a href="login.html" style="color:#fff;text-decoration:none;font-weight:600;">Login</a>
      </div>
    </nav>
  </header>

  <main class="container auth-container">
    <h2>Forgot Password</h2>
    <p>Enter your email and we'll send you a reset link.</p>
    <p id="fpMsg" style="display:none; min-height: 1.2rem;"></p>
    <p id="fpLinkWrap" style="display:none;"></p>
    <form id="fpForm">
      <label for="email">Email</label><br/>
      <input type="email" id="email" name="email" required /><br/>
      <button id="fpSubmit" type="submit">Send Reset Link</button>
    </form>
    <p><a href="login.html">Back to Login</a></p>
  </main>

  <script>
    const form = document.getElementById('fpForm');
    const msgElem = document.getElementById('fpMsg');
    const linkWrapElem = document.getElementById('fpLinkWrap');
    const submitBtn = document.getElementById('fpSubmit');
    const emailInput = document.getElementById('email');

    const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : 'https://rakotee-back.onrender.com';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!email) {
        msgElem.style.color = 'red';
        msgElem.textContent = 'Please enter your email address.';
        msgElem.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      linkWrapElem.style.display = 'none';
      linkWrapElem.innerHTML = '';
      msgElem.style.color = 'red';
      msgElem.textContent = 'Sending reset link...';
      msgElem.style.display = 'block';

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000);
        const res = await fetch(apiBase + '/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
          signal: controller.signal,
        });
        clearTimeout(timeoutId);
        let data = {};
        try {
          data = await res.json();
        } catch {
          data = { message: 'Unexpected server response. Please try again.' };
        }

        msgElem.style.color = res.ok ? 'green' : 'red';
        msgElem.textContent = data.message || 'If that email exists, a reset link has been sent.';
        msgElem.style.display = 'block';
        if (data.resetUrl) {
          linkWrapElem.innerHTML = `Use this secure reset link now: <a href="${data.resetUrl}">Reset Password</a>`;
          linkWrapElem.style.display = 'block';
        }
        if (res.ok) form.reset();
      } catch (err) {
        console.error('Forgot password error:', err);
        msgElem.textContent = err.name === 'AbortError'
          ? 'Request timed out. Please try again in a moment.'
          : 'Network error. Please try again.';
        msgElem.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
