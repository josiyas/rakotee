<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAKOTEE | Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="main-header">
    <nav class="nav-container">
      <div class="logo"><a href="index.html">RAKOTEE</a></div>
    </nav>
  </header>

  <main class="container auth-container">
    <h2>Forgot Password</h2>
    <p>Enter your email and we'll send you a reset link.</p>
    <p id="fpMsg" style="display:none;"></p>
    <form id="fpForm">
      <label for="email">Email</label><br/>
      <input type="email" id="email" name="email" required /><br/>
      <button type="submit">Send Reset Link</button>
    </form>
    <p><a href="login.html">Back to Login</a></p>
  </main>

  <script>
    const form = document.getElementById('fpForm');
    const msgElem = document.getElementById('fpMsg');

    const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : 'https://rakotee-back.onrender.com';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value.trim();
      msgElem.style.display = 'none';
      msgElem.style.color = 'red';

      try {
        const res = await fetch(apiBase + '/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        msgElem.style.color = res.ok ? 'green' : 'red';
        msgElem.textContent = data.message || 'If that email exists, a reset link has been sent.';
        msgElem.style.display = 'block';
        if (res.ok) form.reset();
      } catch {
        msgElem.textContent = 'Network error. Please try again.';
        msgElem.style.display = 'block';
      }
    });
  </script>
</body>
</html>
