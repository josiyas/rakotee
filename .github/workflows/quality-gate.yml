name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: rakotee-backend
        run: npm ci

      - name: Start backend
        working-directory: rakotee-backend
        env:
          PORT: 5000
          JWT_SECRET: ci-secret
          MONGO_URI: mongodb://127.0.0.1:27017/rakotee-ci
          PAYFAST_MODE: sandbox
          PAYFAST_MERCHANT_ID: 10000100
          PAYFAST_MERCHANT_KEY: 46f0cd694581a
        run: |
          nohup node server.js > ../backend.log 2>&1 &

      - name: Wait for backend health
        run: bash rakotee-backend/ci/smoke-test.sh http://localhost:5000 90

      - name: Start static site server
        run: |
          nohup python3 -m http.server 8080 > frontend.log 2>&1 &

      - name: Run frontend + backend smoke checks
        run: bash scripts/smoke-ci.sh http://localhost:5000 http://localhost:8080

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            backend.log
            frontend.log
