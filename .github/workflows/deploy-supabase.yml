name: Deploy Supabase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PG_CONNECTION: ${{ secrets.PG_CONNECTION }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create .env for functions
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env

      - name: Run DB migrations (SQL files)
        if: env.PG_CONNECTION != ''
        run: |
          echo "Applying SQL migrations..."
          psql "$PG_CONNECTION" -f supabase/migrations/001_init.sql
          psql "$PG_CONNECTION" -f supabase/migrations/002_triggers.sql
          psql "$PG_CONNECTION" -f supabase/policies/rls_policies.sql || true

      - name: Deploy Supabase Edge Function: list-users
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy list-users --project-ref "$SUPABASE_PROJECT_REF" --no-verify

      - name: Deploy Supabase Edge Function: manage-user
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy manage-user --project-ref "$SUPABASE_PROJECT_REF" --no-verify

      - name: Post-deploy checks
        run: |
          echo "Deployment completed. You should verify the Supabase dashboard for function status and logs."
