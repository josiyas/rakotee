version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/rakotee-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"